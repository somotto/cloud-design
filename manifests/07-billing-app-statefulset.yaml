apiVersion: v1
kind: Service
metadata:
  name: billing-app
  namespace: orchestrator
spec:
  selector:
    app: billing-app
  ports:
    - port: 5000
      targetPort: 5000
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: billing-app
  namespace: orchestrator
spec:
  serviceName: billing-app
  replicas: 1
  selector:
    matchLabels:
      app: billing-app
  template:
    metadata:
      labels:
        app: billing-app
    spec:
      containers:
      - name: billing-app
        image: k3d-registry.localhost:5000/billing-app:latest
        ports:
        - containerPort: 5000
        env:
        - name: BILLING_APP_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: BILLING_APP_PORT
        - name: BILLING_DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: BILLING_DB_USER
        - name: BILLING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: BILLING_DB_PASSWORD
        - name: BILLING_DB_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: BILLING_DB_NAME
        - name: RABBITMQ_HOST
          value: "billing-queue"
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: RABBITMQ_PORT
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_USER
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_PASSWORD
        - name: RABBITMQ_QUEUE
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secrets
              key: RABBITMQ_QUEUE
